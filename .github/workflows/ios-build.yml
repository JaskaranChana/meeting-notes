name: iOS Build

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile Scribeflow
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: xcodebuild -version

      - name: Build debug app
        run: |
          set -o pipefail
          xcodebuild \
            -project Scribeflow.xcodeproj \
            -scheme Scribeflow \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/ScribeflowDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run core tests
        run: |
          set -o pipefail
          xcodebuild \
            -project Scribeflow.xcodeproj \
            -scheme Scribeflow \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -derivedDataPath "$RUNNER_TEMP/ScribeflowDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Build release app
        run: |
          set -o pipefail
          xcodebuild \
            -project Scribeflow.xcodeproj \
            -scheme Scribeflow \
            -configuration Release \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/ScribeflowReleaseDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build
